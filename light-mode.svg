<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="900" height="360">
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F0F0F5;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6EC7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bf5fff;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft_glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="360" rx="16" fill="url(#bg_grad)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="60" x2="900" y2="60" stroke="#FF6EC7" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="0" y1="150" x2="900" y2="150" stroke="#FF6EC7" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="0" y1="210" x2="900" y2="210" stroke="#FF6EC7" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="0" y1="290" x2="900" y2="290" stroke="#FF6EC7" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="360" stroke="#FF6EC7" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="360" stroke="#FF6EC7" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="3" rx="0" fill="url(#accent_grad)" filter="url(#soft_glow)"/>
  <!-- Left accent strip -->
  <rect x="0" y="0" width="3" height="360" rx="0" fill="url(#accent_grad)" opacity="0.7"/>

  <!-- Corner brackets -->
  <path d="M 20 20 L 20 8 L 8 8" fill="none" stroke="#FF6EC7" stroke-width="2" opacity="0.8"/>
  <path d="M 880 20 L 880 8 L 892 8" fill="none" stroke="#FF6EC7" stroke-width="2" opacity="0.8"/>
  <path d="M 20 340 L 20 352 L 8 352" fill="none" stroke="#FF6EC7" stroke-width="2" opacity="0.8"/>
  <path d="M 880 340 L 880 352 L 892 352" fill="none" stroke="#FF6EC7" stroke-width="2" opacity="0.8"/>

  <!-- Header -->
  <text x="30" y="42" font-family="'Courier New', Courier, monospace" font-size="11" fill="#FF6EC7" opacity="0.7" letter-spacing="4">SRIMANTHL2K6 // GITHUB STATS</text>
  <text x="820" y="42" font-family="'Courier New', Courier, monospace" font-size="11" fill="#FF6EC7" opacity="0.5" text-anchor="end">LIVE</text>
  <circle cx="832" cy="38" r="4" fill="#FF6EC7" opacity="0.8" filter="url(#glow)"/>

  <!-- Divider -->
  <line x1="20" y1="54" x2="880" y2="54" stroke="#FF6EC7" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- ── ROW 1: COMMITS / STARS / REPOS / CONTRIBUTED / FOLLOWERS ── -->

  <!-- COMMITS -->
  <text x="30" y="82" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FF6EC7" opacity="0.6" letter-spacing="2">COMMITS</text>
  <text x="30" y="108" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#1a1a2e"><tspan id="commit_data">173</tspan></text>
  <rect x="30" y="114" width="90" height="2" fill="url(#accent_grad)" opacity="0.6"/>

  <!-- STARS -->
  <text x="200" y="82" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FF6EC7" opacity="0.6" letter-spacing="2">STARS</text>
  <text x="200" y="108" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#1a1a2e"><tspan id="star_data">4</tspan></text>
  <rect x="200" y="114" width="90" height="2" fill="url(#accent_grad)" opacity="0.6"/>

  <!-- REPOS -->
  <text x="370" y="82" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FF6EC7" opacity="0.6" letter-spacing="2">REPOS</text>
  <text x="370" y="108" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#1a1a2e"><tspan id="repo_data">17</tspan></text>
  <rect x="370" y="114" width="90" height="2" fill="url(#accent_grad)" opacity="0.6"/>

  <!-- CONTRIBUTED TO -->
  <text x="520" y="82" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FF6EC7" opacity="0.6" letter-spacing="2">CONTRIBUTED TO</text>
  <text x="520" y="108" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#1a1a2e"><tspan id="contrib_data">18</tspan></text>
  <rect x="520" y="114" width="90" height="2" fill="url(#accent_grad)" opacity="0.6"/>

  <!-- FOLLOWERS -->
  <text x="720" y="82" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FF6EC7" opacity="0.6" letter-spacing="2">FOLLOWERS</text>
  <text x="720" y="108" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#1a1a2e"><tspan id="follower_data">12</tspan></text>
  <rect x="720" y="114" width="90" height="2" fill="url(#accent_grad)" opacity="0.6"/>

  <!-- ── DIVIDER ── -->
  <line x1="20" y1="132" x2="880" y2="132" stroke="#FF6EC7" stroke-opacity="0.15" stroke-width="1"/>

  <!-- ── ROW 2: RELEASES / DEPLOYMENTS ── -->

  <!-- RELEASES -->
  <text x="30" y="158" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FF6EC7" opacity="0.6" letter-spacing="2">RELEASES</text>
  <text x="30" y="184" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#1a1a2e"><tspan id="release_data">21</tspan></text>
  <rect x="30" y="190" width="90" height="2" fill="url(#accent_grad)" opacity="0.6"/>

  <!-- DEPLOYMENTS -->
  <text x="200" y="158" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FF6EC7" opacity="0.6" letter-spacing="2">DEPLOYMENTS</text>
  <text x="200" y="184" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#1a1a2e"><tspan id="deployment_data">131</tspan></text>
  <rect x="200" y="190" width="90" height="2" fill="url(#accent_grad)" opacity="0.6"/>

  <!-- ── DIVIDER ── -->
  <line x1="20" y1="208" x2="880" y2="208" stroke="#FF6EC7" stroke-opacity="0.15" stroke-width="1"/>

  <!-- ── ROW 3: LINES OF CODE ── -->
  <text x="30" y="234" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FF6EC7" opacity="0.6" letter-spacing="2">LINES OF CODE</text>

  <!-- Net LOC -->
  <text x="30" y="268" font-family="'Courier New', Courier, monospace" font-size="30" font-weight="bold" fill="#FF6EC7" filter="url(#soft_glow)"><tspan id="loc_data">141,936</tspan></text>
  <text x="30" y="286" font-family="'Courier New', Courier, monospace" font-size="9" fill="#FF6EC7" opacity="0.5" letter-spacing="2">NET WRITTEN</text>

  <!-- Vertical sep -->
  <line x1="300" y1="214" x2="300" y2="332" stroke="#FF6EC7" stroke-opacity="0.2" stroke-width="1"/>

  <!-- LOC Added -->
  <text x="330" y="234" font-family="'Courier New', Courier, monospace" font-size="10" fill="#16a34a" opacity="0.9" letter-spacing="2">▲ ADDED</text>
  <text x="330" y="268" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#16a34a"><tspan id="loc_add">156,511</tspan></text>
  <rect x="330" y="274" width="100" height="2" fill="#16a34a" opacity="0.5"/>

  <!-- Vertical sep 2 -->
  <line x1="610" y1="214" x2="610" y2="332" stroke="#FF6EC7" stroke-opacity="0.2" stroke-width="1"/>

  <!-- LOC Deleted -->
  <text x="640" y="234" font-family="'Courier New', Courier, monospace" font-size="10" fill="#dc2626" opacity="0.9" letter-spacing="2">▼ DELETED</text>
  <text x="640" y="268" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#dc2626"><tspan id="loc_del">14,575</tspan></text>
  <rect x="640" y="274" width="100" height="2" fill="#dc2626" opacity="0.5"/>

  <!-- Bottom bar -->
  <rect x="0" y="357" width="900" height="3" rx="0" fill="url(#accent_grad)" opacity="0.5"/>

  <!-- Watermark -->
  <text x="870" y="344" font-family="'Courier New', Courier, monospace" font-size="9" fill="#FF6EC7" opacity="0.25" text-anchor="end">one.packet.at.a.time</text>
</svg>