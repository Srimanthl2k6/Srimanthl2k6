<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="900" height="300">
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111820;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6EC7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bf5fff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft_glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" rx="16" fill="url(#bg_grad)" />

  <!-- Subtle grid lines -->
  <line x1="0" y1="60" x2="900" y2="60" stroke="#FF6EC7" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="150" x2="900" y2="150" stroke="#FF6EC7" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="240" x2="900" y2="240" stroke="#FF6EC7" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="300" stroke="#FF6EC7" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="300" stroke="#FF6EC7" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="3" rx="0" fill="url(#accent_grad)" filter="url(#soft_glow)"/>

  <!-- Left accent strip -->
  <rect x="0" y="0" width="3" height="300" rx="0" fill="url(#accent_grad)" opacity="0.7"/>

  <!-- Corner brackets -->
  <path d="M 20 20 L 20 8 L 8 8" fill="none" stroke="#FF6EC7" stroke-width="2" opacity="0.8"/>
  <path d="M 880 20 L 880 8 L 892 8" fill="none" stroke="#FF6EC7" stroke-width="2" opacity="0.8"/>
  <path d="M 20 280 L 20 292 L 8 292" fill="none" stroke="#FF6EC7" stroke-width="2" opacity="0.8"/>
  <path d="M 880 280 L 880 292 L 892 292" fill="none" stroke="#FF6EC7" stroke-width="2" opacity="0.8"/>

  <!-- Header -->
  <text x="30" y="42" font-family="'Courier New', Courier, monospace" font-size="11" fill="#FF6EC7" opacity="0.6" letter-spacing="4">SRIMANTHL2K6 // GITHUB STATS</text>
  <text x="820" y="42" font-family="'Courier New', Courier, monospace" font-size="11" fill="#FF6EC7" opacity="0.4" text-anchor="end">LIVE</text>
  <circle cx="832" cy="38" r="4" fill="#FF6EC7" opacity="0.7" filter="url(#glow)"/>

  <!-- Divider -->
  <line x1="20" y1="54" x2="880" y2="54" stroke="#FF6EC7" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- ROW 1 -->

  <!-- COMMITS -->
  <text x="30" y="90" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FF6EC7" opacity="0.5" letter-spacing="2">COMMITS</text>
  <text x="30" y="116" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#FFFFFF" filter="url(#glow)"><tspan id="commit_data">0</tspan></text>
  <rect x="30" y="122" width="90" height="2" fill="url(#accent_grad)" opacity="0.6"/>

  <!-- STARS -->
  <text x="200" y="90" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FF6EC7" opacity="0.5" letter-spacing="2">STARS</text>
  <text x="200" y="116" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#FFFFFF" filter="url(#glow)"><tspan id="star_data">0</tspan></text>
  <rect x="200" y="122" width="90" height="2" fill="url(#accent_grad)" opacity="0.6"/>

  <!-- REPOS -->
  <text x="370" y="90" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FF6EC7" opacity="0.5" letter-spacing="2">REPOS</text>
  <text x="370" y="116" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#FFFFFF" filter="url(#glow)"><tspan id="repo_data">0</tspan></text>
  <rect x="370" y="122" width="90" height="2" fill="url(#accent_grad)" opacity="0.6"/>

  <!-- CONTRIBUTED -->
  <text x="520" y="90" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FF6EC7" opacity="0.5" letter-spacing="2">CONTRIBUTED TO</text>
  <text x="520" y="116" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#FFFFFF" filter="url(#glow)"><tspan id="contrib_data">0</tspan></text>
  <rect x="520" y="122" width="90" height="2" fill="url(#accent_grad)" opacity="0.6"/>

  <!-- FOLLOWERS -->
  <text x="720" y="90" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FF6EC7" opacity="0.5" letter-spacing="2">FOLLOWERS</text>
  <text x="720" y="116" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#FFFFFF" filter="url(#glow)"><tspan id="follower_data">0</tspan></text>
  <rect x="720" y="122" width="90" height="2" fill="url(#accent_grad)" opacity="0.6"/>

  <!-- Divider row 2 -->
  <line x1="20" y1="146" x2="880" y2="146" stroke="#FF6EC7" stroke-opacity="0.12" stroke-width="1"/>

  <!-- ROW 2: LOC -->
  <text x="30" y="174" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FF6EC7" opacity="0.5" letter-spacing="2">LINES OF CODE</text>

  <!-- Net LOC -->
  <text x="30" y="208" font-family="'Courier New', Courier, monospace" font-size="30" font-weight="bold" fill="#FF6EC7" filter="url(#soft_glow)"><tspan id="loc_data">0</tspan></text>
  <text x="30" y="226" font-family="'Courier New', Courier, monospace" font-size="9" fill="#FF6EC7" opacity="0.4" letter-spacing="2">NET WRITTEN</text>

  <!-- Vertical sep -->
  <line x1="300" y1="154" x2="300" y2="272" stroke="#FF6EC7" stroke-opacity="0.15" stroke-width="1"/>

  <!-- LOC Added -->
  <text x="330" y="174" font-family="'Courier New', Courier, monospace" font-size="10" fill="#4ade80" opacity="0.8" letter-spacing="2">&#9650; ADDED</text>
  <text x="330" y="208" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#4ade80"><tspan id="loc_add">0</tspan></text>
  <rect x="330" y="214" width="100" height="2" fill="#4ade80" opacity="0.5"/>

  <!-- Vertical sep 2 -->
  <line x1="610" y1="154" x2="610" y2="272" stroke="#FF6EC7" stroke-opacity="0.15" stroke-width="1"/>

  <!-- LOC Deleted -->
  <text x="640" y="174" font-family="'Courier New', Courier, monospace" font-size="10" fill="#f87171" opacity="0.8" letter-spacing="2">&#9660; DELETED</text>
  <text x="640" y="208" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#f87171"><tspan id="loc_del">0</tspan></text>
  <rect x="640" y="214" width="100" height="2" fill="#f87171" opacity="0.5"/>

  <!-- Bottom bar -->
  <rect x="0" y="297" width="900" height="3" rx="0" fill="url(#accent_grad)" opacity="0.5"/>

  <!-- Watermark -->
  <text x="870" y="284" font-family="'Courier New', Courier, monospace" font-size="9" fill="#FF6EC7" opacity="0.2" text-anchor="end">one.packet.at.a.time</text>
</svg>
